<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>エスト北塚口管理組合 公式サイト（準備中）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #f7f4ee 0%, #efe2d2 100%);
    color: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    line-height: 1.85;
  }
  .container {
    background: rgba(255, 255, 255, 0.96);
    max-width: 620px;
    width: 100%;
    padding: 56px 44px;
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
    border-top: 6px solid #a0522d;
  }
  .icon {
    font-size: 56px;
    margin-bottom: 22px;
  }
  h1 {
    font-size: 22px;
    color: #1a3a6e;
    margin-bottom: 8px;
    letter-spacing: 2px;
    font-weight: bold;
  }
  .subtitle {
    font-size: 13px;
    color: #6e6e6e;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }
  .status-card {
    background: #fefbf5;
    border-left: 4px solid #a0522d;
    padding: 22px 26px;
    border-radius: 8px;
    margin: 24px 0;
    text-align: left;
    font-size: 14.5px;
    line-height: 1.95;
  }
  .status-card h2 {
    font-size: 14px;
    color: #a0522d;
    margin-bottom: 10px;
  }
  .status-card .accent {
    color: #2e6b4f;
    font-weight: bold;
  }
  .meta {
    font-size: 12.5px;
    color: #999;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid #e8e8e8;
    line-height: 1.9;
  }
  .meta .small {
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🍃</div>
  <h1>エスト北塚口管理組合</h1>
  <div class="subtitle">公式ホームページ</div>

  <div class="status-card">
    <h2>📋 現在準備中です</h2>
    <p>本ホームページは、組合内で内容精査を行っております。<br>
       <span class="accent">理事会承認後</span>に正式公開いたします。</p>
  </div>

  <div class="meta">
    エスト北塚口管理組合<br>
    1985年竣工 ／ 2026年6月 自主管理開始
    <div class="small">公開予定：2026年夏ごろ</div>
  </div>
</div>
</body>
</html>
