  function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
  async function unlock(){
    var pw=document.getElementById('pw').value;
    var err=document.getElementById('err'); err.textContent='復号中…';
    try{
      var bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);

      document.open();document.write(html);document.close();
    }catch(e){ err.textContent='パスワードが違います。'; }
  }
  document.getElementById('btn').addEventListener('click',unlock);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
