  function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
  async function unlock(){
    var pw=document.getElementById('pw').value;
    var err=document.getElementById('err'); err.textContent='復号中…';
    try{
      var bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
